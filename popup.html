<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fear &amp; Greed</title>
  <link rel="stylesheet" href="popup.css" />
  <script src="popup.js" defer></script>
</head>
<body>
  <div id="app">
    <div class="header">
      <span class="title">Fear &amp; Greed Index</span>
    </div>

    <div class="fng-section">
      <div class="gauge-wrap">
        <svg class="gauge" viewBox="0 0 200 130">
          <defs>
            <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ea3943"/>
              <stop offset="30%" stop-color="#f97316"/>
              <stop offset="55%" stop-color="#f3ba2f"/>
              <stop offset="75%" stop-color="#93d900"/>
              <stop offset="100%" stop-color="#16c784"/>
            </linearGradient>
          </defs>
          <!-- background arc -->
          <path class="gauge-bg" d="M 15 100 A 85 85 0 0 1 185 100" fill="none" stroke="#f3f4f6" stroke-width="16" stroke-linecap="round"/>
          <!-- fill arc -->
          <path class="gauge-fill" id="gauge" d="M 15 100 A 85 85 0 0 1 185 100" fill="none" stroke="url(#arcGrad)" stroke-width="16" stroke-linecap="round" stroke-dasharray="267" stroke-dashoffset="267"/>

          <!-- value text -->
          <text class="gauge-value" id="gaugeValue" x="100" y="88" text-anchor="middle" dominant-baseline="central">--</text>
          <text class="gauge-label" id="gaugeLabel" x="100" y="112" text-anchor="middle" dominant-baseline="central"></text>
        </svg>
      </div>
    </div>

    <div class="divider"></div>

    <div class="btc-section">
      <div class="btc-row">

        <div class="btc-info">
          <span class="btc-name">Bitcoin</span>
          <div class="btc-price-row">
            <span class="btc-price" id="btcPrice">--</span>
            <span class="btc-change" id="btcChange"></span>
          </div>
        </div>
        <div class="btc-sparkline">
          <svg class="sparkline" id="sparkline" viewBox="0 0 80 30" preserveAspectRatio="none">
            <polyline id="sparklinePath" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" points=""/>
          </svg>
        </div>
      </div>
    </div>

    <div class="footer">
      <span class="updated" id="updatedLabel">Loading...</span>
      <button class="reload-btn" id="reloadBtn" title="Reload data">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
        </svg>
      </button>
      <span class="status-dot" id="statusDot"></span>
    </div>
  </div>
</body>
</html>
